<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Filters for Depth/Shadow -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients for Julia Colors -->
    <!-- Purple -->
    <radialGradient id="grad-purple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b57fe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9558B2;stop-opacity:1" />
    </radialGradient>

    <!-- Red -->
    <radialGradient id="grad-red" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#e65c53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CB3C33;stop-opacity:1" />
    </radialGradient>

    <!-- Green -->
    <radialGradient id="grad-green" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5cb84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </radialGradient>

    <!-- Blue -->
    <radialGradient id="grad-blue" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#6b8fe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4063D8;stop-opacity:1" />
    </radialGradient>

    <!-- Arrow Marker -->
    <marker id="arrowhead" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#4063D8" />
    </marker>
  </defs>

  <!-- Background Container (White rounded rect) -->
  <rect x="24" y="24" width="464" height="464" rx="80" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Main Content Group: Network Graph + Text -->

  <!-- Graph (5-node network representing longitudinal panel) -->
  <g transform="translate(0, -50) scale(0.75) translate(80, 40)">
      <!-- Connecting Edges (Blue #4063D8) -->
      <!-- Top-left -> Top-right -->
      <line x1="170" y1="130" x2="310" y2="130" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Top-right -> Bottom-right -->
      <line x1="355" y1="175" x2="355" y2="315" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Bottom-right -> Bottom-left -->
      <line x1="310" y1="370" x2="170" y2="370" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Bottom-left -> Top-left -->
      <line x1="125" y1="315" x2="125" y2="175" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Top-left -> Center -->
      <line x1="165" y1="170" x2="215" y2="215" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Center -> Top-right -->
      <line x1="275" y1="215" x2="320" y2="170" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Center -> Bottom-right -->
      <line x1="275" y1="285" x2="320" y2="330" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Bottom-left -> Center -->
      <line x1="165" y1="330" x2="215" y2="285" stroke="#4063D8" stroke-width="10" stroke-linecap="round" marker-end="url(#arrowhead)"/>

      <!-- Nodes (Radius 50) -->
      <!-- Top-left: Purple -->
      <circle cx="120" cy="120" r="50" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)"/>

      <!-- Top-right: Red -->
      <circle cx="360" cy="120" r="50" fill="url(#grad-red)" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)"/>

      <!-- Center: Blue -->
      <circle cx="240" cy="250" r="50" fill="url(#grad-blue)" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)"/>

      <!-- Bottom-left: Green -->
      <circle cx="120" cy="380" r="50" fill="url(#grad-green)" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)"/>

      <!-- Bottom-right: Purple -->
      <circle cx="360" cy="380" r="50" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)"/>
  </g>

  <!-- Text "Siena.jl" -->
  <g transform="translate(256, 455)" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="72" letter-spacing="1">
    <!-- S: Purple -->
    <text x="-140" y="0" fill="#9558B2" filter="url(#dropShadow)">S</text>
    <!-- i: Red -->
    <text x="-95" y="0" fill="#CB3C33" filter="url(#dropShadow)">i</text>
    <!-- e: Green -->
    <text x="-62" y="0" fill="#389826" filter="url(#dropShadow)">e</text>
    <!-- n: Purple -->
    <text x="-20" y="0" fill="#9558B2" filter="url(#dropShadow)">n</text>
    <!-- a: Red -->
    <text x="25" y="0" fill="#CB3C33" filter="url(#dropShadow)">a</text>
    <!-- .: Dark Grey -->
    <text x="65" y="0" fill="#555555">.</text>
    <!-- j: Green -->
    <text x="88" y="0" fill="#389826" filter="url(#dropShadow)">j</text>
    <!-- l: Blue -->
    <text x="118" y="0" fill="#4063D8" filter="url(#dropShadow)">l</text>
  </g>

</svg>
